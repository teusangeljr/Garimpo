services:
  # 1. Redis para a Fila de Jobs (Celery)
  - type: redis
    name: garimpo-redis
    ipAllowList: [] # Permite conexões apenas de serviços internos
    plan: free

  # 2. Backend API (Flask)
  - type: web
    name: garimpo-api
    env: python
    buildCommand: "./backend/render-build.sh"
    startCommand: "cd backend && gunicorn app:app --timeout 180"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: garimpo-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: RENDER_EXTERNAL_URL # Para o keep-awake
        fromContext: instanceUrl

  # 3. Celery Worker (Processamento em Background)
  - type: worker
    name: garimpo-worker
    env: python
    buildCommand: "./backend/render-build.sh"
    startCommand: "cd backend && celery -A tasks worker --loglevel=info -P solo"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: garimpo-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

  # 4. Frontend (Vite Static Site)
  - type: static
    name: garimpo-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishDir: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: garimpo-api
          property: host
