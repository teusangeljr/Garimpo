services:
  # Backend API (Flask + Threading, sem Redis)
  - type: web
    name: garimpo-api
    env: python
    buildCommand: "./render-build.sh"
    startCommand: "gunicorn app:app --timeout 300 --workers 1 --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: RENDER_EXTERNAL_URL
        fromContext: instanceUrl
